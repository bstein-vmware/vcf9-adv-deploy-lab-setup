apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: demo-cluster-3qdtf
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 192.168.156.0/20
    services:
      cidrBlocks:
        - 10.96.0.0/12
    serviceDomain: cluster.local
  topology:
    class: builtin-generic-v3.4.0
    classNamespace: vmware-system-vks-public
    version: v1.33.3---vmware.1-fips-vkr.1
    variables:
      - name: vsphereOptions
        value:
          persistentVolumes:
            availableStorageClasses:
              - cluster-wld01-01a-vsan-storage-policy
            defaultStorageClass: cluster-wld01-01a-vsan-storage-policy
      - name: kubernetes
        value:
          certificateRotation:
            enabled: true
            renewalDaysBeforeExpiry: 90
      - name: vmClass
        value: best-effort-medium
      - name: storageClass
        value: cluster-wld01-01a-vsan-storage-policy
    controlPlane:
      replicas: 1
      metadata:
        annotations:
          run.tanzu.vmware.com/resolve-os-image: >-
            os-name=ubuntu, content-library=cl-4bc0943472259825e,
            os-version=24.04
    workers:
      machineDeployments:
        - class: node-pool
          name: demo-cluster-3qdtf-np-w2s3
          replicas: 2
          metadata:
            annotations:
              run.tanzu.vmware.com/resolve-os-image: >-
                os-name=ubuntu, content-library=cl-4bc0943472259825e,
                os-version=24.04
          variables:
            overrides:
              - name: volumes
                value:
                  - name: vol-rh8s
                    mountPath: /var/lib/containerd
                    storageClass: cluster-wld01-01a-vsan-storage-policy
                    capacity: 30Gi
