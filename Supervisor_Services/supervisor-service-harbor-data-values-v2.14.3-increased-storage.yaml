caBundleSecretName: null
cache:
  enabled: false
  expireHours: 24
concurrentRequestLimit:
  registry:
    enabled: false
    max: 500
core:
  replicas: 1
  secret: VMware123!VMware123!
  xsrfKey: 0123456789ABCDEF0123456789ABCDEF
createNetworkPolicy: true
database:
  password: VMware123!VMware123!
  type: internal
enableContourHttpProxy: false
enableNginxLoadBalancer: true
harborAdminPassword: VMware123!VMware123!
hostname: harbor.site-a.vcf.lab
jobservice:
  registryHttpClientTimeout: 30
  replicas: 1
  secret: VMware123!VMware123!
metrics:
  core:
    path: /metrics
    port: 8001
  enabled: true
  exporter:
    path: /metrics
    port: 8001
  jobservice:
    path: /metrics
    port: 8001
  registry:
    path: /metrics
    port: 8001
namespace: svc-harbor-domain-c10
network:
  ipFamilies:
  - IPv4
persistence:
  persistentVolumeClaim:
    database:
      accessMode: ReadWriteOnce
      existingClaim: ""
      size: 100Gi
      storageClass: cluster-wld01-01a-vsan-storage-policy
      subPath: ""
    jobservice:
      jobLog:
        accessMode: ReadWriteOnce
        existingClaim: ""
        size: 20Gi
        storageClass: cluster-wld01-01a-vsan-storage-policy
        subPath: ""
    redis:
      accessMode: ReadWriteOnce
      existingClaim: ""
      size: 100Gi
      storageClass: cluster-wld01-01a-vsan-storage-policy
      subPath: ""
    registry:
      accessMode: ReadWriteOnce
      existingClaim: ""
      size: 100Gi
      storageClass: cluster-wld01-01a-vsan-storage-policy
      subPath: ""
    trivy:
      accessMode: ReadWriteOnce
      existingClaim: ""
      size: 50Gi
      storageClass: cluster-wld01-01a-vsan-storage-policy
      subPath: ""
port:
  https: 443
registry:
  replicas: 1
  secret: VMware123!VMware123!
resources:
  containers:
  - cpuLimit: 1000m
    cpuRequest: 500m
    memoryLimit: 2Gi
    memoryRequest: 512Mi
    name: core
  - cpuLimit: 2000m
    cpuRequest: 1000m
    memoryLimit: 2Gi
    memoryRequest: 1Gi
    name: database
  - cpuLimit: 1000m
    cpuRequest: 500m
    memoryLimit: 2Gi
    memoryRequest: 512Mi
    name: jobservice
  - cpuLimit: 300m
    cpuRequest: 100m
    memoryLimit: 256Mi
    memoryRequest: 128Mi
    name: portal
  - cpuLimit: 500m
    cpuRequest: 200m
    memoryLimit: 1Gi
    memoryRequest: 256Mi
    name: redis
  - cpuLimit: 1000m
    cpuRequest: 500m
    memoryLimit: 2Gi
    memoryRequest: 512Mi
    name: registry
  - cpuLimit: 500m
    cpuRequest: 200m
    memoryLimit: 512Mi
    memoryRequest: 256Mi
    name: registryctl
  - cpuLimit: 2000m
    cpuRequest: 500m
    memoryLimit: 4Gi
    memoryRequest: 1Gi
    name: trivy
  - cpuLimit: 300m
    cpuRequest: 100m
    memoryLimit: 256Mi
    memoryRequest: 128Mi
    name: exporter
  namespaceLimitRange:
    defaultCPULimit: 1000m
    defaultCPURequest: 300m
    defaultMemoryLimit: 2Gi
    defaultMemoryRequest: 256Mi
secretKey: 0123456789ABCDEF
tlsCertificate:
  ca.crt: null
  signingSettings:
    additionalDnsNames: []
    caIssuer:
      ca.crt: null
      ca.key: null
    ipAddresses: []
  tls.crt: null
  tls.key: null
  tlsSecretLabels:
    managed-by: vmware-vRegistry
trivy:
  dbRepository: ghcr.io/aquasecurity/trivy-db
  enabled: true
  gitHubToken: ""
  insecure: false
  javaDBRepository: ghcr.io/aquasecurity/trivy-java-db
  offlineScan: false
  skipJavaDBUpdate: false
  skipUpdate: false
  timeout: ""
  tmpdir: /home/scanner/.cache

