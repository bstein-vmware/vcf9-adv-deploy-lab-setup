---
#! enable tlsConfig part if try to use TLS connection with TLS enabled BIND DNS server
#tlsConfig:
#  tls_enable: true
#! User require to provide base64 encryption format of ca.crt value which uses to validate tls connection with DNS server once tls_enable=true
#  ca_crt: ""

#! User define the new priority class
#priorityClassName: "user-defined-ps"

#! #! Re-Define the limits value of LimitRange quota of external-dns installation namespace, such as "tanzu-system-service-discovery"
#nsLimitRange:
#  defaultRequests:
#    cpu: "60m"
#    memory: "78Mi"
#  defaultLimits:
#    cpu: "200m"
#    memory: "256Mi"

deployment:
  args:
    - --registry=txt
    - --txt-prefix=external-dns-
    - --txt-owner-id=k8s
    - --provider=rfc2136
    - --rfc2136-host=100.93.1.123    #! update the bind DNS server ip/fqdn accordingly
    - --rfc2136-port=53
    - --rfc2136-zone=k8s.ex.com      #! update this domain according to your own bind server zone configuration
    - --rfc2136-tsig-secret=fFO4YMkI/ZptqsnJW/EIiptfblHx0VSGyN77=   #! update the tsig secret when deploy bind server uses
    - --rfc2136-tsig-secret-alg=hmac-sha256
    - --rfc2136-tsig-keyname=externaldns-key        #! update the tsig keyname when deploy bind server uses
    - --rfc2136-tsig-axfr
    - --source=service
    - --source=ingress
    - --domain-filter=k8s.ex.com
    #- --log-level=debug           #! enable it if trying to do debug
#  resources:               #! user configure the container resources' requests & limits
#    requests:
#      cpu: "50m"
#      memory: "64Mi"
#    limits:
#      cpu: "100m"
#      memory: "128Mi"